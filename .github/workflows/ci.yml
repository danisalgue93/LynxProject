name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/lynx-backend
  IMAGE_FRONTEND: ${{ github.repository_owner }}/lynx-frontend

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint · Types · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lynx_test
          POSTGRES_USER: lynx
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://lynx:test_password@localhost:5432/lynx_test
      JWT_SECRET: ci-test-jwt-secret-that-is-at-least-32-chars
      REFRESH_SECRET: ci-test-refresh-secret-different-value-here
      CORS_ORIGIN: http://localhost:3000
      STORE_DRIVER: memory
      SENTRY_DSN: ""   # intentionally empty in CI — Sentry is a no-op without a DSN

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint · Types · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # ── Docker build (only on main) ───────────────────────────────────────────────
  docker:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SOLANA_NETWORK=mainnet-beta
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_MAGIC_PUBLISHABLE_KEY=${{ secrets.VITE_MAGIC_PUBLISHABLE_KEY }}
            VITE_MOONPAY_API_KEY=${{ secrets.VITE_MOONPAY_API_KEY }}
